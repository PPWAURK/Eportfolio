services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - portfolio_data:/app/data
      - ./data/videos:/app/public/videos:ro
    environment:
      - NODE_ENV=production
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - CONTACT_TO=${CONTACT_TO:-wangshihong2333@gmail.com}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/portfolio.conf:/etc/nginx/conf.d/portfolio.conf:ro
      - ./data/ssl:/etc/nginx/ssl:ro
      - ./data/certbot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  portfolio_data:
